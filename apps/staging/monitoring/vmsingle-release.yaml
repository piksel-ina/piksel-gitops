apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmsingle
  namespace: monitoring
spec:
  releaseName: vmsingle
  targetNamespace: monitoring
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.18.0"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
      interval: 5m
  interval: 5m
  values:
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
        storageClassName: gp3
      retentionPeriod: "6"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi
