  spawn.html: |
    {% extends "page.html" %}
    {% if announcement_spawn is string %}
      {% set announcement = announcement_spawn %}
    {% endif %}
    
    {% block main %}
      <div class="container">
        {% block heading %}
          <div class="text-center mb-4">
            <h2 class="spawn-heading">Selamat Datang di Piksel Sandbox</h2>
          </div>
        {% endblock heading %}
    
        <div class="row spawn-row">
          <div class="col-lg-7 col-md-12 mb-4">
            <div class="card spawn-card-left">
              <div class="card-body">
                <h4 class="section-label">
                  <i class="fa fa-flag"></i>Get Started
                </h4>
                <p class="section-intro">
                  Piksel Sandbox adalah Jupyter Notebook berbasis komputasi-awan yang didesain untuk belajar dan bereksperimen dengan dataset dan library geospatial.
                </p>
    
                <h5 class="subsection-title">Apa yang bisa Anda temukan di sini:</h5>
                <ul class="list-group list-group-flush">
                  <li class="list-group-item">
                    <div class="feature-title"><i class="fa fa-globe"></i> Geospasial Data-Science Toolkit</div>
                    <p class="feature-desc">
                      Sandbox ini dilengkapi dengan berbagai tools penting untuk data science, seperti geopandas dan library lainnya untuk analisis data geospasial.
                    </p>
                  </li>
                  <li class="list-group-item">
                    <div class="feature-title"><i class="fa fa-book"></i> Contoh untuk Belajar</div>
                    <p class="feature-desc">
                      Jelajahi berbagai contoh dan pelajari cara kerja dengan data geospasial.
                    </p>
                    <ul class="feature-list-inner">
                      <li>Mulai dari hal dasar, seperti loading, analisis, dan plotting data observasi bumi menggunakan Datacube.</li>
                      <li>Eksplorasi aplikasi praktis, seperti mapping garis pantai.</li>
                    </ul>
                  </li>
                  <li class="list-group-item">
                    <div class="feature-title"><i class="fa fa-server"></i> Resource yang Dijamin</div>
                    <p class="feature-desc mb-0">
                      Setiap user mendapat resource khusus untuk mendukung pekerjaan mereka, mulai dari 2 vCPU dan 16GB RAM.
                    </p>
                  </li>
                </ul>
              </div>
            </div>
          </div>
    
          <div class="col-lg-5 col-md-12">
            <div class="card spawn-card-right">
              <div class="card-header">
                <h4 class="card-title mb-0" style="font-size: 0.92rem; font-weight: 600;">
                  <i class="fa fa-cubes me-2"></i>Environments
                </h4>
              </div>
