  page.html: |
    {% extends "templates/page.html" %}
    
    {% block favicon %}
    <link rel="icon" type="image/x-icon" href="https://github.com/piksel-ina/piksel-document/blob/main/assets/logo/piksel-logo%20(2000%20x%202000%20px).ico?raw=true">
    {% endblock %}
    
    {% block title %} Sandbox - Piksel {% endblock %}
    
    {% block stylesheet %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {{ super() }}
    <style>
    {% include 'variables.css' %}
    {% include 'base.css' %}
    {% include 'navbar.css' %}
    </style>
    <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
    </script>
    {% endblock %}
    
    {% block nav_bar %}
      <div class="container">
      <nav class="navbar navbar-expand navbar-light mb-4">
        <div class="container-fluid">
          {% block logo %}
            <span id="jupyterhub-logo" class="navbar-brand">
              <a href="https://sandbox.staging.piksel.big.go.id">
                <img src='https://raw.githubusercontent.com/piksel-ina/piksel-documentation/refs/heads/main/assets/logo/piksel-sandbox.png'
                  alt='Piksel logo'
                  class='jpy-logo jpy-logo-light'
                  title='Home' />
                <img src='https://raw.githubusercontent.com/piksel-ina/piksel-documentation/refs/heads/main/assets/logo/piksel-sandbox-white.png'
                  alt='Piksel logo'
                  class='jpy-logo jpy-logo-dark'
                  title='Home' />
              </a>
            </span>
          {% endblock logo %}
    
          <div class="navbar-content">
            <ul class="navbar-nav me-auto mb-0">
              {% if user %}
                {% block nav_bar_left_items %}
                {% endblock nav_bar_left_items %}
              {% endif %}
            </ul>
            <ul class="nav navbar-nav me-2">
              {% block nav_bar_right_items %}
                <li class="nav-item d-flex align-items-center">
                  {% block login_widget %}
                    <span id="login_widget">
                      {% if user %}
                        <span class="me-1">{{ user.name }}</span>
                        <a id="logout"
                          role="button"
                          class="btn btn-sm btn-outline-contrast"
                          href="{{ logout_url }}"> <i aria-hidden="true" class="fa fa-sign-out"></i> Logout</a>
                      {% else %}
                        <a id="login"
                          role="button"
                          class="btn btn-sm btn-outline-contrast"
                          href="{{ login_url }}">Login</a>
                      {% endif %}
                    </span>
                  {% endblock login_widget %}
                </li>
              {% endblock nav_bar_right_items %}
            </ul>
            <button class="theme-toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); localStorage.setItem('theme', document.documentElement.getAttribute('data-theme'));" title="Toggle dark mode" aria-label="Toggle dark mode">
              <i class="fa fa-moon"></i>
              <i class="fa fa-sun"></i>
            </button>
          </div>
          {% block header %}
          {% endblock header %}
        </div>
      </nav>
      <div>
    {% endblock nav_bar %}

