    {% block script %}
    {{ super() }}
    <script>
    $('form').submit(function(e) {
      var form = $(e.target);
      form.find('button[type="submit"]').attr('disabled', true).addClass('hidden');
      form.find('.feedback-widget').removeClass('hidden');
      form.find('.feedback-widget .fa-spinner').addClass('fa-pulse');
    });
    
    function syncCardHeights() {
      var leftCard = document.querySelector('.spawn-card-left');
      var rightCard = document.querySelector('.spawn-card-right');
      if (leftCard && rightCard) {
        var h = leftCard.offsetHeight;
          rightCard.style.height = h + 'px';
      }
    }
    syncCardHeights();
    window.addEventListener('resize', syncCardHeights);
    new ResizeObserver(syncCardHeights).observe(document.querySelector('.spawn-card-left'));
    </script>
    {% endblock script %}

