apiVersion: apps/v1
kind: Deployment
metadata:
  name: datacube-ows
  namespace: open-datacube
  labels:
    app: datacube-ows
    component: web-service
spec:
  replicas: 6
  selector:
    matchLabels:
      app: datacube-ows
  template:
    metadata:
      labels:
        app: datacube-ows
        component: web-service
    spec:
      serviceAccountName: odc-data-reader

      containers:
        - name: datacube-ows
          image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/inadc-ows:v20260430-0703
          imagePullPolicy: IfNotPresent

          args:
            - "gunicorn"
            - "-b"
            - "0.0.0.0:8000"
            - "--workers=3"
            - "--threads=4"
            - "-k"
            - "gthread"
            - "--keep-alive"
            - "75"
            - "--max-requests"
            - "10000"
            - "--max-requests-jitter"
            - "1000"
            - "--timeout"
            - "500"
            - "--log-level"
            - "warning"
            - "--worker-tmp-dir"
            - "/dev/shm"
            - "datacube_ows.wsgi"

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30

          env:
            - name: ODC_DEFAULT_DB_HOSTNAME
              value: "pg-proxy-service.database.svc.cluster.local"
            - name: ODC_DEFAULT_DB_PORT
              value: "6432"
            - name: ODC_DEFAULT_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: odcread-secret
                  key: username
            - name: ODC_DEFAULT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odcread-secret
                  key: password
            - name: ODC_DEFAULT_DB_DATABASE
              value: odc
            - name: ODC_DEFAULT_INDEX_DRIVER
              value: "postgis"
            - name: DB_CONNECTION_TIMEOUT
              value: "120"

            - name: AWS_NO_SIGN_REQUEST
              value: "no"
            - name: AWS_REQUEST_PAYER
              value: "requester"
            - name: AWS_DEFAULT_REGION
              value: "ap-southeast-3"

            - name: VSI_CACHE
              value: "TRUE"
            - name: VSI_CACHE_SIZE
              value: "536870912"
            - name: GDAL_HTTP_MERGE_CONSECUTIVE_RANGES
              value: "YES"
            - name: GDAL_DISABLE_READDIR_ON_OPEN
              value: "EMPTY_DIR"
            - name: CPL_VSIL_CURL_ALLOWED_EXTENSIONS
              value: ".tif,.tiff,.ovr"

          volumeMounts:
            - name: dshm
              mountPath: /dev/shm

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 15

          resources:
            requests:
              cpu: "1500m"
              memory: "3Gi"
            limits:
              cpu: "2500m"
              memory: "4Gi"

      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - datacube-ows
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 60
