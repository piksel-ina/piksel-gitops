            "icon": "story",
            "itemName": "storymigration",
            "markdownText": "## Migrasi Share & Story\n\n### Panduan update link share, termasuk stories\n\nKalau kamu dapat peringatan bahwa link share dibuat dari versi TerriaJS yang lebih lama, kamu perlu buat ulang di versi Terria terbaru!\n\n#### Pembuat\n\n1. Cari URL share yang memunculkan notifikasi upaya preservasi share saat dimuat ke Terria. Misalnya kamu mungkin tahu di mana mereka di-embed, atau menemukan secara tidak sengaja\n2. Buka di aplikasi peta berbasis versi baru (v8)\n3. Cek bahwa semuanya share seperti yang kamu harapkan, sesuaikan layer kalau ada yang hilang atau tidak bekerja dengan benar\n4. Update link share dengan klik tombol Share/Print dan copy link baru\n5. Kalau distribusi link share diketahui, update url di halaman web kamu (kalau di-embed), atau kirim link baru ke user\n\n#### Konsumen\n1. Load URL share\n2. Kalau tidak terlihat benar, beritahu penyedia supaya mereka bisa ikuti langkah di atas untuk buat ulang di versi Terria terbaru",
            "title": "Migrasi Share & Story"
