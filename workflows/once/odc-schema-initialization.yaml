apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: odc-schema-init-
  name: odc-schema-init
  namespace: argo-workflows
spec:
  entrypoint: odc-schema-initialization
  serviceAccountName: argo-workflows-executor
  podGC:
    strategy: OnWorkflowSuccess
  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  volumes:
    - name: rds-ca
      configMap:
        name: rds-ca-cert
  templates:
    - name: odc-schema-initialization
      script:
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/inadc-core:v20260429-1009
        resources:
          requests:
            memory: 500Mi
            cpu: 1000m
          limits:
            memory: 1Gi
            cpu: 2000m
        command: [bash]
        volumeMounts:
          - name: rds-ca
            mountPath: /tmp/rds-ca
        source: |
          set -e

          echo "=== ODC Schema Initialization ==="
          echo "Database: $POSTGRES_DB | ODC User: $ODC_USER | Read User: $ODC_READ_USER"

          export PGSSLMODE=verify-ca
          export PGSSLROOTCERT=/tmp/rds-ca/ap-southeast-3-bundle.pem

          run_sql() {
            local host="$1" port="$2" user="$3" password="$4" database="$5" query="$6"
            PGPASSWORD="$password" psql -h "$host" -p "$port" -U "$user" -d "$database" -c "$query" -q
          }

          run_sql_check() {
            local host="$1" port="$2" user="$3" password="$4" database="$5" query="$6"
            PGPASSWORD="$password" psql -h "$host" -p "$port" -U "$user" -d "$database" -tAc "$query"
          }

          # Validate prerequisites (TF-provisioned)
          echo "Validating prerequisites..."
          run_sql "$POSTGRES_HOST" "$POSTGRES_PORT" "$MASTER_USER" "$MASTER_PASSWORD" "postgres" "SELECT 1;" > /dev/null

          DB_EXISTS=$(run_sql_check "$POSTGRES_HOST" "$POSTGRES_PORT" "$MASTER_USER" "$MASTER_PASSWORD" "postgres" "SELECT 1 FROM pg_database WHERE datname='$POSTGRES_DB';" || echo "0")
          [ "$DB_EXISTS" != "1" ] && { echo "ERROR: Database $POSTGRES_DB not found. Run terraform apply first."; exit 1; }

          USER_EXISTS=$(run_sql_check "$POSTGRES_HOST" "$POSTGRES_PORT" "$MASTER_USER" "$MASTER_PASSWORD" "postgres" "SELECT 1 FROM pg_roles WHERE rolname='$ODC_USER';" || echo "0")
          READ_USER_EXISTS=$(run_sql_check "$POSTGRES_HOST" "$POSTGRES_PORT" "$MASTER_USER" "$MASTER_PASSWORD" "postgres" "SELECT 1 FROM pg_roles WHERE rolname='$ODC_READ_USER';" || echo "0")
          [ "$USER_EXISTS" != "1" ] && { echo "ERROR: User $ODC_USER not found. Run terraform apply first."; exit 1; }
          [ "$READ_USER_EXISTS" != "1" ] && { echo "ERROR: User $ODC_READ_USER not found. Run terraform apply first."; exit 1; }

          POSTGIS_EXISTS=$(run_sql_check "$POSTGRES_HOST" "$POSTGRES_PORT" "$MASTER_USER" "$MASTER_PASSWORD" "$POSTGRES_DB" "SELECT 1 FROM pg_extension WHERE extname='postgis';" || echo "0")
          [ "$POSTGIS_EXISTS" != "1" ] && { echo "ERROR: PostGIS extension not found. Run terraform apply first."; exit 1; }

          echo "✓ Prerequisites validated (database, users, PostGIS — all TF-provisioned)"

          # Clean existing schemas (fresh init only)
          echo "Cleaning existing ODC schemas..."
          run_sql "$POSTGRES_HOST" "$POSTGRES_PORT" "$MASTER_USER" "$MASTER_PASSWORD" "$POSTGRES_DB" "DROP SCHEMA IF EXISTS odc CASCADE;" 2>/dev/null || true
          run_sql "$POSTGRES_HOST" "$POSTGRES_PORT" "$MASTER_USER" "$MASTER_PASSWORD" "$POSTGRES_DB" "DROP SCHEMA IF EXISTS agdc CASCADE;" 2>/dev/null || true
          echo "✓ Schemas cleaned"

          # Initialize ODC (creates odc schema + odc_user/odc_manage/odc_admin roles)
          echo "Initializing ODC schema..."
          export ODC_DEFAULT_DB_HOSTNAME="$POSTGRES_HOST"
          export ODC_DEFAULT_DB_PORT="$POSTGRES_PORT"
          export ODC_DEFAULT_DB_DATABASE="$POSTGRES_DB"
          export ODC_DEFAULT_DB_USERNAME="$MASTER_USER"
          export ODC_DEFAULT_DB_PASSWORD="$MASTER_PASSWORD"
          export ODC_CONFIG_PATH="/home/odc/.datacube.conf"

          envsubst < /home/odc/.datacube.conf.template > /home/odc/.datacube.conf
          datacube -v system init
          echo "✓ ODC schema initialized"

          # Grant ODC roles to TF-provisioned users
          echo "Granting ODC roles..."
          datacube user grant manage "$ODC_USER"
          datacube user grant user "$ODC_READ_USER"
          echo "✓ Roles granted ($ODC_USER → odc_manage, $ODC_READ_USER → odc_user)"

          # Create spatial indexes
          echo "Creating spatial indexes..."
          for epsg in 4326 3857; do
            datacube spindex create $epsg > /dev/null 2>&1 || true
            datacube spindex update $epsg > /dev/null 2>&1 || true
          done
          echo "✓ Spatial indexes created (4326, 3857)"

          # Test PgBouncer connections (no SSL for internal)
          echo "Testing PgBouncer connections..."
          export PGSSLMODE=disable PGSSLROOTCERT=""

          PGPASSWORD="$ODC_PASS" psql -h pg-proxy-service.database.svc.cluster.local -p 6432 -U "$ODC_USER" -d "$POSTGRES_DB" -c "SELECT 1;" || {
            echo "WARNING: ODC user PgBouncer connection failed"
          }

          PGPASSWORD="$ODC_READ_PASS" psql -h pg-proxy-service.database.svc.cluster.local -p 6432 -U "$ODC_READ_USER" -d "$POSTGRES_DB" -c "SELECT 1;" || {
            echo "WARNING: ODC read user PgBouncer connection failed"
          }
          echo "✓ PgBouncer connections tested"

          # Final system check via PgBouncer
          echo "Running final system check..."
          export ODC_DEFAULT_DB_HOSTNAME="pg-proxy-service.database.svc.cluster.local"
          export ODC_DEFAULT_DB_PORT="6432"
          export ODC_DEFAULT_DB_USERNAME="$ODC_USER"
          export ODC_DEFAULT_DB_PASSWORD="$ODC_PASS"

          envsubst < /home/odc/.datacube.conf.template > /home/odc/.datacube.conf
          datacube system check

          echo ""
          echo "=== ODC Schema Initialization Complete ==="
          echo "  PostGIS: enabled (TF)"
          echo "  ODC schema: initialized"
          echo "  ODC roles: odc_user, odc_manage, odc_admin"
          echo "  User grants: $ODC_USER → odc_manage, $ODC_READ_USER → odc_user"
          echo "  Spatial indexes: EPSG 4326, 3857"
          echo "  PgBouncer: pg-proxy-service.database.svc.cluster.local:6432"

        env:
          - name: POSTGRES_HOST
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: db_address
          - name: POSTGRES_PORT
            value: "5432"
          - name: POSTGRES_DB
            value: "odc"
          - name: MASTER_USER
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: username
          - name: MASTER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password
          - name: ODC_USER
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: ODC_PASS
            valueFrom:
              secretKeyRef:
                name: odc
                key: password
          - name: ODC_READ_USER
            valueFrom:
              secretKeyRef:
                name: odcread
                key: username
          - name: ODC_READ_PASS
            valueFrom:
              secretKeyRef:
                name: odcread
                key: password
