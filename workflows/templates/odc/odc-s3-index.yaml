apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: odc-s3-indexer
  namespace: argo-workflows
spec:
  serviceAccountName: argo-workflows-executor
  entrypoint: s3-indexing
  ttlStrategy:
    secondsAfterCompletion: 300
  podGC:
    strategy: OnPodCompletion
  podMetadata:
    annotations:
      karpenter.sh/do-not-disrupt: "true"
    labels:
      app: odc-s3-indexer
  arguments:
    parameters:
      - name: s3-uri
        value: "s3://piksel-staging-public-data/gm_s2/0.0.1/**/*.stac-item.json"
      - name: product-name
        value: "gm_s2_annual"
      - name: aws-region
        value: "ap-southeast-3"
      - name: no-sign-request
        value: "true"
      - name: rename-product
        value: "geomad_s2_annual"
  workflowTemplateRef:
    name: odc-base
  templates:
    - name: s3-indexing
      inputs:
        parameters:
          - name: s3-uri
            value: "{{workflow.parameters.s3-uri}}"
          - name: product-name
            value: "{{workflow.parameters.product-name}}"
          - name: aws-region
            value: "{{workflow.parameters.aws-region}}"
          - name: no-sign-request
            value: "{{workflow.parameters.no-sign-request}}"
          - name: rename-product
            value: "{{workflow.parameters.rename-product}}"
      steps:
        - - name: index-from-s3
            templateRef:
              name: odc-base
              template: run
            arguments:
              parameters:
                - name: command
                  value: >-
                    CMD="s3-to-dc --stac";
                    if [ "{{inputs.parameters.no-sign-request}}" = "true" ]; then CMD="$CMD --no-sign-request"; fi;
                    if [ -n "{{inputs.parameters.rename-product}}" ] && [ "{{inputs.parameters.rename-product}}" != "" ]; then CMD="$CMD --rename-product={{inputs.parameters.rename-product}}"; fi;
                    CMD="$CMD '{{inputs.parameters.s3-uri}}' '{{inputs.parameters.product-name}}'";
                    echo "$CMD";
                    eval $CMD;
                    echo "Completed S3 STAC indexing"
                - name: aws-region
                  value: "{{inputs.parameters.aws-region}}"
