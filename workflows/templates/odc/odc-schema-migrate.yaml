apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: odc-schema-migrate
  namespace: argo-workflows
  annotations:
    description: "Run datacube schema migration (idempotent). Use: argo submit --from workflowtemplate/odc-schema-migrate"
spec:
  serviceAccountName: argo-workflows-executor
  entrypoint: migrate
  ttlStrategy:
    secondsAfterCompletion: 86400
  podGC:
    strategy: OnWorkflowSuccess
  podMetadata:
    annotations:
      karpenter.sh/do-not-disrupt: "true"
    labels:
      app: odc-schema-migrate
  volumes:
    - name: rds-ca
      configMap:
        name: rds-ca-cert
  templates:
    - name: migrate
      steps:
        - - name: schema-init
            template: schema-init

        - - name: grant-roles
            template: grant-roles

        - - name: update-spatial-indexes
            template: update-spatial-indexes

    - name: schema-init
      container:
        name: odc
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/inadc-core:v20260429-1009
        command: [bash, -c]
        args:
          - |
            set -e
            export PGSSLMODE=verify-ca
            export PGSSLROOTCERT=/tmp/rds-ca/ap-southeast-3-bundle.pem

            echo "=== ODC Schema Migration ==="
            datacube --version
            echo ""
            echo "Running datacube system init (idempotent)..."
            datacube -v system init
            echo ""
            echo "Running system check..."
            datacube system check
            echo ""
            echo "✓ Schema migration complete"
        env:
          - name: ODC_DEFAULT_DB_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: db_address
          - name: ODC_DEFAULT_DB_PORT
            value: "5432"
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            value: "odc"
          - name: ODC_DEFAULT_INDEX_DRIVER
            value: "postgis"
        volumeMounts:
          - name: rds-ca
            mountPath: /tmp/rds-ca
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"

    - name: grant-roles
      container:
        name: odc
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/inadc-core:v20260429-1009
        command: [bash, -c]
        args:
          - |
            set -e
            export PGSSLMODE=verify-ca
            export PGSSLROOTCERT=/tmp/rds-ca/ap-southeast-3-bundle.pem

            echo "=== Granting ODC roles ==="
            datacube user grant manage odc
            echo "✓ odc_manage granted to odc user"
            datacube user grant user odcread
            echo "✓ odc_user granted to odcread user"
        env:
          - name: ODC_DEFAULT_DB_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: db_address
          - name: ODC_DEFAULT_DB_PORT
            value: "5432"
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            value: "odc"
          - name: ODC_DEFAULT_INDEX_DRIVER
            value: "postgis"
        volumeMounts:
          - name: rds-ca
            mountPath: /tmp/rds-ca
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

    - name: update-spatial-indexes
      container:
        name: odc
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/inadc-core:v20260429-1009
        command: [bash, -c]
        args:
          - |
            set -e
            export PGSSLMODE=verify-ca
            export PGSSLROOTCERT=/tmp/rds-ca/ap-southeast-3-bundle.pem

            echo "Updating spatial indexes..."
            for epsg in 4326 3857; do
              echo "Creating/updating spatial index for EPSG:$epsg"
              datacube spindex create $epsg || true
              datacube spindex update $epsg
            done
            echo "✓ Spatial indexes updated"
        env:
          - name: ODC_DEFAULT_DB_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: db_address
          - name: ODC_DEFAULT_DB_PORT
            value: "5432"
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            value: "odc"
          - name: ODC_DEFAULT_INDEX_DRIVER
            value: "postgis"
        volumeMounts:
          - name: rds-ca
            mountPath: /tmp/rds-ca
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
