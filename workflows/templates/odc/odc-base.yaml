apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: odc-base
  namespace: argo-workflows
  annotations:
    description: "Centralized ODC image and DB config. Update odc-image parameter here."
spec:
  serviceAccountName: argo-workflows-executor
  podMetadata:
    annotations:
      karpenter.sh/do-not-disrupt: "true"
    labels:
      component: odc

  arguments:
    parameters:
      - name: odc-image
        value: "686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/inadc-core:v20260429-1009"

  templates:
    - name: run
      inputs:
        parameters:
          - name: command
          - name: odc-image
            value: "{{workflow.parameters.odc-image}}"
          - name: db-secret
            value: "odc"
          - name: db-database
            value: "odc"
          - name: memory-request
            value: "1Gi"
          - name: memory-limit
            value: "4Gi"
          - name: cpu-request
            value: "500m"
          - name: cpu-limit
            value: "2000m"
      container:
        name: odc
        image: "{{inputs.parameters.odc-image}}"
        command: [bash, -c]
        args: ["{{inputs.parameters.command}}"]
        env:
          - name: ODC_DEFAULT_DB_HOSTNAME
            value: "pg-proxy-service.database.svc.cluster.local"
          - name: ODC_DEFAULT_DB_PORT
            value: "6432"
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.db-secret}}"
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.db-secret}}"
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            value: "{{inputs.parameters.db-database}}"
          - name: ODC_DEFAULT_INDEX_DRIVER
            value: "postgis"
        resources:
          requests:
            memory: "{{inputs.parameters.memory-request}}"
            cpu: "{{inputs.parameters.cpu-request}}"
          limits:
            memory: "{{inputs.parameters.memory-limit}}"
            cpu: "{{inputs.parameters.cpu-limit}}"

    - name: run-admin
      inputs:
        parameters:
          - name: command
          - name: odc-image
            value: "{{workflow.parameters.odc-image}}"
          - name: db-port
            value: "5432"
          - name: memory-request
            value: "1Gi"
          - name: memory-limit
            value: "4Gi"
          - name: cpu-request
            value: "1000m"
          - name: cpu-limit
            value: "2000m"
      container:
        name: odc
        image: "{{inputs.parameters.odc-image}}"
        command: [bash, -c]
        args: ["{{inputs.parameters.command}}"]
        env:
          - name: ODC_DEFAULT_DB_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: db_address
          - name: ODC_DEFAULT_DB_PORT
            value: "{{inputs.parameters.db-port}}"
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            value: "odc"
          - name: ODC_DEFAULT_INDEX_DRIVER
            value: "postgis"
        resources:
          requests:
            memory: "{{inputs.parameters.memory-request}}"
            cpu: "{{inputs.parameters.cpu-request}}"
          limits:
            memory: "{{inputs.parameters.memory-limit}}"
            cpu: "{{inputs.parameters.cpu-limit}}"
