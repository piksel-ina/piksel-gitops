# --- Infrastructure configurations (db-user-create, notifications) ---
# Note: cert-manager, ingress-nginx, metrics-server, nvidia-device-plugin, cluster-issuers,
# storage-class, and efs-csi have been migrated to Terraform (terraform-iac/cluster-addons/)
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/staging/configs
  prune: true
  wait: true
---
# --- Addons (pg-bouncer only) ---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: infra-addons
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/staging/pg-bouncer
  prune: true
  wait: true
